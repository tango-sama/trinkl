<script>
(function () {
  document.getElementById('yr').textContent = new Date().getFullYear();
  DS.getSettings().then(SiteUI.applySettings);
  DS.getCategories().then(function (cats) {
    var visible = cats.filter(function (c) { return c.visible !== false; });
    var grid = document.getElementById('catGrid');
    if (!visible.length) { grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--ink-3)">لا توجد تصنيفات بعد.</p>'; return; }
    grid.innerHTML = visible.map(function (c) {
      var img = c.image ? '<img src="' + SiteUI.esc(c.image) + '" alt="' + SiteUI.esc(c.name) + '" loading="lazy">' : '<div class="placeholder">🌸</div>';
      return '<a class="cat-tile" href="products.html?cat=' + encodeURIComponent(c.id) + '">' + img +
        '<div class="cat-meta"><div class="cat-name">' + SiteUI.esc(c.name) + '</div><div class="cat-go">تسوّقي الآن ←</div></div></a>';
    }).join('');
    SiteUI.observeReveals(grid);
  });
})();
</script>
