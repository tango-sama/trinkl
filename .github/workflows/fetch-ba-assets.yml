name: Fetch before/after assets
on:
  push:
    branches: [claude/collagen-before-after-section-ns9ck3]
    paths: ['.github/workflows/fetch-ba-assets.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/collagen-before-after-section-ns9ck3
      - name: Install webp tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq webp
      - name: Download generated images and convert to webp
        run: |
          set -euo pipefail
          cd assets/collagen
          curl -fsSL -o ba-skin-before.png  'https://d8j0ntlcm91z4.cloudfront.net/user_2zyVHCXwp7nZtFdb9vk8026Re7h/hf_20260716_165647_3b4c5bfe-a922-4e45-9f5c-ffdf5476d7a9.png'
          curl -fsSL -o ba-hair-before.png  'https://d8j0ntlcm91z4.cloudfront.net/user_2zyVHCXwp7nZtFdb9vk8026Re7h/hf_20260716_165656_22ff9d15-d7bb-4ddf-866f-025e10fcd0f5.png'
          curl -fsSL -o ba-nails-before.png 'https://d8j0ntlcm91z4.cloudfront.net/user_2zyVHCXwp7nZtFdb9vk8026Re7h/hf_20260716_165659_e4ecc781-b10e-41dd-a851-1b779b233bb7.png'
          curl -fsSL -o prob-wrinkles.png   'https://d8j0ntlcm91z4.cloudfront.net/user_2zyVHCXwp7nZtFdb9vk8026Re7h/hf_20260716_165721_a6a96781-15c2-478e-9ad8-a5eb62562d5a.png'
          curl -fsSL -o prob-dryskin.png    'https://d8j0ntlcm91z4.cloudfront.net/user_2zyVHCXwp7nZtFdb9vk8026Re7h/hf_20260716_165722_14d02fe6-e577-405d-82eb-97fd5467296d.png'
          for f in ba-skin-before ba-hair-before ba-nails-before prob-wrinkles prob-dryskin; do
            cwebp -quiet -q 82 "$f.png" -o "$f.webp"
            rm "$f.png"
          done
          ls -la
      - name: Commit assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/collagen/*.webp
          git commit -m "Add generated before/after and card background images"
          git push
