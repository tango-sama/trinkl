    <script>
        (function () {
            // --- Sticky WhatsApp bar: show after 500px scroll, hide on admin route ---
            var bar = document.getElementById('sticky-wa-bar');
            var isAdmin = function () { return (location.hash || '').indexOf('/amelhadj') !== -1; };
            var onScroll = function () {
                if (!bar) return;
                if (window.scrollY > 500 && !isAdmin()) bar.classList.add('show');
                else bar.classList.remove('show');
            };
            window.addEventListener('scroll', onScroll, { passive: true });
            window.addEventListener('hashchange', onScroll);

            // --- Scroll reveal for all sections ---
            var io = new IntersectionObserver(function (entries) {
                entries.forEach(function (e) {
                    if (e.isIntersecting) {
                        e.target.setAttribute('data-visible', '');
                        e.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

            var scan = function () {
                document.querySelectorAll('main section, .reveal').forEach(function (el) {
                    if (el.__revObserved) return;
                    el.__revObserved = true;
                    if (!el.classList.contains('reveal')) el.setAttribute('data-reveal', '');
                    io.observe(el);
                });
            };

            var scheduled = false;
            var schedule = function () {
                if (scheduled) return;
                scheduled = true;
                requestAnimationFrame(function () { scheduled = false; scan(); });
            };

            var root = document.getElementById('root');
            if (root) new MutationObserver(schedule).observe(root, { childList: true, subtree: true });
            window.addEventListener('hashchange', schedule);
            schedule();
        })();
    </script>
