.toolbar{max-width:1320px;margin:0 auto;padding:1.5rem 3rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap;justify-content:space-between}
.search-box{position:relative;flex:1;min-width:240px;max-width:420px}
.search-box input{width:100%;background:var(--bg-2);border:1.5px solid var(--line);border-radius:100px;
  padding:.8rem 2.8rem .8rem 1.2rem;font-family:var(--sans);font-size:.92rem;color:var(--ink);outline:none;transition:border .25s}

.sortsel{background:var(--bg-2);border:1.5px solid var(--line);border-radius:100px;padding:.75rem 1.2rem;font-family:var(--sans);font-size:.88rem;color:var(--ink);cursor:pointer;outline:none}
.filter-pills{max-width:1320px;margin:0 auto;padding:.5rem 3rem 1.5rem;display:flex;gap:.6rem;flex-wrap:wrap}
.fpill{background:var(--bg-2);border:1.5px solid var(--line);color:var(--ink-2);font-family:var(--sans);
  font-size:.84rem;font-weight:700;padding:.5rem 1.2rem;border-radius:100px;cursor:pointer;transition:all .25s}
.fpill:hover{border-color:var(--rose-soft);color:var(--rose-deep)}
.fpill.active{background:linear-gradient(135deg,var(--rose),var(--rose-deep));border-color:transparent;color:#fff;box-shadow:0 6px 16px rgba(224,114,140,.3)}
.results-grid{max-width:1320px;margin:0 auto;padding:.5rem 3rem 4rem}
.empty{text-align:center;color:var(--ink-3);padding:4rem 1rem;font-weight:700}
.empty .ic{font-size:3.5rem;margin-bottom:1rem}
.count-tag{font-size:.82rem;color:var(--ink-3);font-weight:600}
@media(max-width:768px){.page-head{padding:6.5rem 1.2rem .5rem}.toolbar,.filter-pills,.results-grid{padding-inline:1.2rem}}
</style>

<script src="js/firebase.js"></script>

<script src="js/cart.js"></script>
<script>
(function () {
  document.getElementById('yr').textContent = new Date().getFullYear();
  var params = new URLSearchParams(location.search);
  var activeCat = params.get('cat') || 'all';
  var search = '', sort = 'new', catMap = {}, ALL = [];

  var pillsEl = document.getElementById('pills'), grid = document.getElementById('pgrid'),
      empty = document.getElementById('empty'), countTag = document.getElementById('countTag'),
      titleEl = document.getElementById('pageTitle');

  function render() {
    var list = ALL.slice();
    if (activeCat !== 'all') list = list.filter(function (p) { return p.category === activeCat; });
    if (search) { var q = search.toLowerCase(); list = list.filter(function (p) {
      return ((p.title || p.name || '') + ' ' + (p.subtitle || '')).toLowerCase().indexOf(q) !== -1; }); }
    if (sort === 'price-asc') list.sort(function (a, b) { return DS.priceNum(a.price) - DS.priceNum(b.price); });
    else if (sort === 'price-desc') list.sort(function (a, b) { return DS.priceNum(b.price) - DS.priceNum(a.price); });
    else if (sort === 'name') list.sort(function (a, b) { return String(a.title || '').localeCompare(String(b.title || ''), 'ar'); });
    else list.sort(function (a, b) { return (Number(b.lastModified || b.id) || 0) - (Number(a.lastModified || a.id) || 0); });

    countTag.textContent = list.length + ' منتج';
    if (!list.length) { grid.innerHTML = ''; empty.style.display = ''; return; }
    empty.style.display = 'none';
    grid.innerHTML = list.map(function (p) { return SiteUI.productCardHTML(p, catMap[p.category] || ''); }).join('');
    SiteUI.observeReveals(grid);
    titleEl.textContent = activeCat === 'all' ? 'كل المنتجات' : (catMap[activeCat] || 'المنتجات');
  }

  function renderPills(cats) {
    var html = '<button class="fpill' + (activeCat === 'all' ? ' active' : '') + '" data-cat="all">الكل</button>';
    html += cats.filter(function (c) { return c.visible !== false; }).map(function (c) {
      return '<button class="fpill' + (activeCat === c.id ? ' active' : '') + '" data-cat="' + SiteUI.esc(c.id) + '">' + SiteUI.esc(c.name) + '</button>';
    }).join('');
    pillsEl.innerHTML = html;
  }

  DS.getSettings().then(SiteUI.applySettings);
  DS.getCategories().then(function (cats) {
    cats.forEach(function (c) { catMap[c.id] = c.name; });
    renderPills(cats);
    if (activeCat !== 'all') titleEl.textContent = catMap[activeCat] || 'المنتجات';
  });
  DS.getProducts().then(function (prods) { ALL = prods; window._DS_PRODUCTS = prods; render(); });

  pillsEl.addEventListener('click', function (e) {
    var b = e.target.closest('.fpill'); if (!b) return;
    activeCat = b.dataset.cat;
    pillsEl.querySelectorAll('.fpill').forEach(function (x) { x.classList.toggle('active', x === b); });
    var u = new URL(location); if (activeCat === 'all') u.searchParams.delete('cat'); else u.searchParams.set('cat', activeCat);
    history.replaceState(null, '', u);
    render();
  });
  var st;
  document.getElementById('search').addEventListener('input', function (e) { clearTimeout(st); var v = e.target.value; st = setTimeout(function () { search = v.trim(); render(); }, 200); });
  document.getElementById('sort').addEventListener('change', function (e) { sort = e.target.value; render(); });
})();
</script>
