<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<base href="/" />
<link rel="icon" type="image/webp" href="assets/logo.webp">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<script>try{if(localStorage.getItem('ds_theme')==='light')document.documentElement.classList.add('light')}catch(e){}</script>
<title>لوحة التحكم | Desert Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1B1419;--card:#241A20;--card-2:#2E222A;--border:#3A2C34;
  --ink:#F5EDF0;--ink-2:#C9B6BF;--ink-3:#9A8590;
  --rose:#E0728C;--rose-deep:#C8546F;--gold:#D9A86C;
  --green:#22c55e;--danger:#E5484D;--blue:#5B8DEF;
  --sans:'Cairo','Tajawal',sans-serif;
}
html.light{
  --bg:#F6EFF2;--card:#FFFFFF;--card-2:#F3E7EC;--border:#E7D6DE;
  --ink:#3A2A31;--ink-2:#75606B;--ink-3:#9C8791;
}
html.light .login-wrap{background:radial-gradient(ellipse 80% 60% at 50% 0%,#FBEFF3,#F6EFF2)}
html.light .login-card{box-shadow:0 30px 70px rgba(58,42,49,.14)}
html.light .toast{background:#E9F9EF;color:#15803D;border-color:#B5E6C8}
html.light .tag.new{color:#3465C4}
html.light .tag.done{color:#15803D}
/* inline pastel accents from JS templates are tuned for dark bg — darken them in light mode */
html.light [style*="#9DBBF5"]{color:#2E5FC7!important}
html.light [style*="#7CE5A0"]{color:#15803D!important}
html.light [style*="#F2A1A4"]{color:#C43E44!important}
html.light [style*="#FF9A8C"]{color:#C2402F!important}
html.light [style*="#F3B4C2"]{color:#C8546F!important}
html.light [style*="#FFC9C0"]{color:#B33A2B!important}
html.light [style*="#C4B5FD"]{color:#6D4FC1!important}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}
.num{direction:ltr;unicode-bidi:isolate}
img{display:block;max-width:100%}
input,select,textarea,button{font-family:var(--sans)}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,#2A1D24,#1B1419)}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:2.5rem;width:100%;max-width:380px;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.5)}
.login-card .logo{font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,var(--rose),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.4rem}
.login-card .sub{color:var(--ink-3);font-size:.82rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:2rem}
.login-card input{width:100%;background:var(--card-2);border:1.5px solid var(--border);color:var(--ink);padding:.85rem 1rem;border-radius:12px;outline:none;margin-bottom:1rem;text-align:center;font-size:1rem}
.login-card input:focus{border-color:var(--rose)}
.login-card button{width:100%;background:linear-gradient(135deg,var(--rose),var(--rose-deep));color:#fff;border:none;padding:.9rem;border-radius:12px;font-weight:800;cursor:pointer;font-size:.95rem}

/* SHELL */
.shell{display:none}
.shell.on{display:block}
.sidebar{width:230px;position:fixed;top:0;right:0;bottom:0;background:var(--card);border-left:1px solid var(--border);z-index:20;display:flex;flex-direction:column;transition:transform .25s}
.sidebar-logo{padding:1.5rem 1.4rem;border-bottom:1px solid var(--border)}
.sidebar-logo .name{font-weight:900;font-size:1.15rem;background:linear-gradient(135deg,var(--rose),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-logo .sub{font-size:.62rem;color:var(--ink-3);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.nav-items{padding:.75rem 0;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:.7rem;padding:.7rem 1.4rem;cursor:pointer;font-size:.9rem;color:var(--ink-2);border-right:3px solid transparent;transition:all .15s}
.nav-item:hover{color:var(--ink);background:rgba(255,255,255,.03)}
.nav-item.active{color:var(--rose);border-right-color:var(--rose);background:rgba(224,114,140,.1)}
.nav-item .ic{width:22px;text-align:center;font-size:1.05rem}
.nav-badge{margin-right:auto;background:var(--card-2);color:var(--ink-2);font-size:.7rem;font-weight:800;padding:1px 8px;border-radius:100px;min-width:20px;text-align:center}
.sidebar-foot{padding:1rem 1.4rem;border-top:1px solid var(--border)}
.sidebar-foot a,.sidebar-foot button{display:block;width:100%;text-align:center;background:var(--card-2);border:1px solid var(--border);color:var(--ink-2);padding:.55rem;border-radius:10px;font-size:.82rem;cursor:pointer;margin-bottom:.5rem}
.sidebar-foot button:hover{color:var(--danger);border-color:var(--danger)}
.main{margin-right:230px;padding:1.75rem 2rem;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem}
.topbar h1{font-size:1.5rem;font-weight:900}
.menu-btn{display:none;background:var(--card);border:1px solid var(--border);color:var(--ink);width:42px;height:42px;border-radius:12px;font-size:1.2rem;cursor:pointer}

/* COMPONENTS */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.5rem;margin-bottom:1.5rem}
.card h3{font-size:1.05rem;font-weight:800;margin-bottom:1.1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.field{margin-bottom:1rem}
.field.full{grid-column:1/-1}
.field label{display:block;font-size:.78rem;font-weight:700;color:var(--ink-2);margin-bottom:.45rem}
.inp,.sel,.txt{width:100%;background:var(--card-2);border:1.5px solid var(--border);color:var(--ink);padding:.7rem .9rem;border-radius:11px;outline:none;font-size:.9rem;transition:border .2s}
.inp:focus,.sel:focus,.txt:focus{border-color:var(--rose)}
.txt{resize:vertical;min-height:90px}
.btn{border:none;border-radius:11px;padding:.7rem 1.3rem;font-weight:800;cursor:pointer;font-size:.88rem;transition:all .2s;display:inline-flex;align-items:center;gap:.4rem}
.btn-green{background:var(--green);color:#fff}.btn-rose{background:linear-gradient(135deg,var(--rose),var(--rose-deep));color:#fff}
.btn-blue{background:var(--blue);color:#fff}.btn-gray{background:var(--card-2);color:var(--ink-2);border:1px solid var(--border)}
.btn-danger{background:var(--danger);color:#fff}.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-sm{padding:.4rem .8rem;font-size:.78rem;border-radius:8px}
.upload-lbl{display:inline-flex;align-items:center;gap:.5rem;background:var(--card-2);border:1px dashed var(--border);color:var(--ink-2);padding:.55rem 1rem;border-radius:10px;cursor:pointer;font-size:.82rem;font-weight:700}
.upload-lbl:hover{border-color:var(--rose);color:var(--ink)}
.thumb-prev{width:64px;height:64px;border-radius:10px;object-fit:cover;border:1px solid var(--border);background:var(--card-2)}
.row-actions{display:flex;gap:.4rem;flex-wrap:wrap}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1rem}
.search{background:var(--card-2);border:1.5px solid var(--border);color:var(--ink);padding:.55rem 1rem;border-radius:100px;outline:none;min-width:220px}
table{width:100%;border-collapse:collapse}
th,td{text-align:right;padding:.8rem;border-bottom:1px solid var(--border);font-size:.85rem;vertical-align:middle}
th{color:var(--ink-3);font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px}
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden}
.tbl-scroll{overflow-x:auto}
.cell-prod{display:flex;align-items:center;gap:.7rem}
.cell-prod img{width:42px;height:42px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--card-2)}
.tag{display:inline-block;background:var(--card-2);color:var(--ink-2);font-size:.72rem;padding:2px 9px;border-radius:100px;border:1px solid var(--border)}
.tag.new{background:rgba(91,141,239,.18);color:#9DBBF5;border-color:transparent}
.tag.done{background:rgba(34,197,94,.18);color:#7CE5A0;border-color:transparent}
.empty{text-align:center;padding:3.5rem 1rem;color:var(--ink-3);font-weight:700}
.ledger{width:100%;border-collapse:collapse;font-size:.88rem}
.ledger th{text-align:right;padding:.75rem 1rem;font-size:.74rem;font-weight:800;color:var(--ink-3);border-bottom:1px solid var(--border)}
.ledger td{padding:.7rem 1rem;border-top:1px solid var(--border);color:var(--ink-2);vertical-align:middle}
.ledger td.amt{font-weight:900;white-space:nowrap;direction:ltr;text-align:left}
.ledger tr.in td.amt{color:#22c55e}
.ledger tr.out td.amt{color:#ef4444}
.ledger tr.in td:first-child{border-right:3px solid #22c55e}
.ledger tr.out td:first-child{border-right:3px solid #ef4444}
.empty .ic{font-size:3rem;margin-bottom:.75rem}
.pager{display:flex;justify-content:center;gap:.4rem;margin-top:1.25rem}
.pager button{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--ink-2);cursor:pointer;font-weight:700}
.pager button.on{background:var(--rose);color:#fff;border-color:transparent}
.imgs-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.6rem}
.imgs-row .ig{position:relative}
.imgs-row .ig img{width:56px;height:56px;border-radius:9px;object-fit:cover;border:1px solid var(--border)}
.imgs-row .ig button{position:absolute;top:-6px;left:-6px;width:20px;height:20px;border-radius:50%;background:var(--danger);color:#fff;border:none;cursor:pointer;font-size:.7rem;line-height:1}
.order-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:1rem}
.order-card.byadmin{border-color:#7C5CBF;box-shadow:inset 4px 0 0 #7C5CBF}
.order-card.confirmed .odim{opacity:.55;filter:grayscale(.6);transition:opacity .2s,filter .2s}
.order-card.confirmed:hover .odim{opacity:.85;filter:grayscale(.25)}
.ocard>summary.ocard-h{cursor:pointer;list-style:none;display:block}
.ocard>summary.ocard-h::-webkit-details-marker{display:none}
.ocard>summary.ocard-h::after{content:'▸ عرض التفاصيل';display:block;font-size:.72rem;color:var(--ink-3);font-weight:800;margin-top:.6rem}
.ocard[open]>summary.ocard-h::after{content:'▾ إخفاء التفاصيل'}
.order-card:has(.ocard:not([open])){opacity:.82}
.order-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.75rem;margin-bottom:.75rem}
.order-items{background:var(--card-2);border-radius:11px;padding:.75rem 1rem;font-size:.84rem;color:var(--ink-2);margin:.5rem 0}
.order-pics{display:flex;gap:.6rem;overflow-x:auto;background:var(--card-2);border-radius:11px;padding:.6rem;margin:.5rem 0 0;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.order-pics .op{position:relative;flex-shrink:0}
.order-pics img{width:96px;height:96px;border-radius:10px;object-fit:cover;display:block;background:#fff;border:1px solid var(--border)}
.order-pics .op b{position:absolute;top:-6px;right:-6px;min-width:22px;height:22px;padding:0 5px;border-radius:100px;background:#22C55E;color:#fff;font-size:.72rem;font-weight:900;display:flex;align-items:center;justify-content:center;border:2px solid var(--card);}
.order-dots{display:flex;justify-content:center;gap:6px;margin:.45rem 0 .5rem}
.order-dots i{width:8px;height:8px;border-radius:50%;background:#22C55E;display:block}
.order-meta{display:flex;gap:1.25rem;flex-wrap:wrap;font-size:.82rem;color:var(--ink-2)}
.ptrack{background:var(--card-2);border-radius:11px;padding:.9rem 1rem;margin-top:.6rem}
.ptrack-empty{display:flex;align-items:center;justify-content:space-between;gap:.7rem;flex-wrap:wrap;font-size:.82rem;color:var(--ink-3)}
.ptrack-alert{display:flex;align-items:center;gap:.5rem;background:rgba(229,72,77,.14);color:#F2A1A4;font-weight:800;font-size:.85rem;padding:.6rem .8rem;border-radius:9px}
.pstep{display:flex;align-items:flex-start;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.pstep-node{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:74px}
.pstep-dot{width:32px;height:32px;border-radius:50%;background:var(--card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--ink-3);flex-shrink:0}
.pstep-node.done .pstep-dot{background:var(--green);border-color:var(--green);color:#fff}
.pstep-node.cur .pstep-dot{box-shadow:0 0 0 4px rgba(34,197,94,.25)}
.pstep-lab{font-size:.66rem;font-weight:700;color:var(--ink-3);text-align:center;margin-top:.4rem;line-height:1.4}
.pstep-node.done .pstep-lab{color:var(--ink-2)}
.pstep-node.cur .pstep-lab{color:var(--green)}
.pstep-line{position:relative;flex:1;height:2px;background:var(--border);margin:15px 2px 0;min-width:16px}
.pstep-line.done{background:var(--green)}
.pstep-line.warn{background:#E5484D}
.pstep-warn{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);font-size:1rem;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
.ptrack-meta{font-size:.72rem;color:var(--ink-3);margin-top:.7rem;display:flex;flex-direction:column;gap:.35rem}
.ptrack-status{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.ptrack-badge{font-size:.75rem;font-weight:800;padding:.22rem .6rem;border-radius:100px;white-space:nowrap}
.ptrack-badge.ok{background:rgba(34,197,94,.18);color:#7CE5A0}
.ptrack-badge.warn{background:rgba(229,72,77,.16);color:#F2A1A4}
.ptrack-badge.bad{background:rgba(229,72,77,.2);color:#F2A1A4}
.ptrack-raw{color:var(--ink-2);font-size:.74rem}
.ptrack-raw b{color:var(--ink);font-weight:800}
.ptrack-sub{color:var(--ink-3);font-size:.7rem}
.ptrack-log{margin-top:.7rem;border-top:1px solid var(--border);padding-top:.6rem}
.ptrack-log-h{font-size:.74rem;font-weight:800;color:var(--ink-2);margin-bottom:.5rem;cursor:pointer;list-style:none;user-select:none}
.ptrack-log-h::-webkit-details-marker{display:none}
.ptrack-log-h::before{content:'▸ ';color:var(--ink-3)}
details[open] .ptrack-log-h::before{content:'▾ '}
.ptrack-log-item{padding:.4rem .6rem;border-right:2px solid var(--border);background:var(--card);border-radius:8px;margin-bottom:.4rem}
.ptrack-log-top{font-size:.76rem;color:var(--ink);font-weight:800}
.ptrack-log-top.ok{color:#7CE5A0}.ptrack-log-top.bad{color:#F2A1A4}.ptrack-log-top.warn{color:#F5CE7A}.ptrack-log-top.info{color:#9DBBF5}
.ptrack-log-sub{font-size:.68rem;color:var(--ink-3);margin-top:.2rem;display:flex;flex-wrap:wrap;gap:.1rem}
.ptrack-log-sub .clr{font-weight:700}
.ptrack-log-sub .clr.ok{color:#7CE5A0}.ptrack-log-sub .clr.bad{color:#F2A1A4}.ptrack-log-sub .clr.warn{color:#F5CE7A}.ptrack-log-sub .clr.info{color:#9DBBF5}
.toast{position:fixed;bottom:1.5rem;left:1.5rem;z-index:200;background:#13201A;color:#7CE5A0;border:1px solid #1f5137;padding:.8rem 1.3rem;border-radius:12px;font-weight:700;transform:translateY(120%);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.hidden{display:none!important}
@media(max-width:860px){
  .sidebar{transform:translateX(100%);box-shadow:-4px 0 30px rgba(0,0,0,.5)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-right:0}
  /* Keep the hamburger visible while scrolling; above the sidebar so it can close it too */
  .menu-btn{display:block;position:fixed;top:1rem;inset-inline-start:1rem;z-index:30;box-shadow:0 4px 14px rgba(0,0,0,.45)}
  .topbar{padding-inline-start:calc(42px + .9rem)}
  .grid2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login">
  <form class="login-card" id="loginForm">
    <div class="logo">Desert Shop</div>
    <div class="sub">لوحة التحكم</div>
    <input type="password" id="pw" placeholder="كلمة المرور" autocomplete="current-password">
    <button type="submit">دخول</button>
  </form>
</div>

<!-- SHELL -->
<div class="shell" id="shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="name">جمالكِ الخارجي</div><div class="sub">ADMIN PANEL</div></div>
    <nav class="nav-items">
      <div class="nav-item active" data-view="products"><span class="ic">🧴</span> المنتجات <span class="nav-badge" id="bProducts">0</span></div>
      <div class="nav-item" data-view="categories"><span class="ic">📁</span> التصنيفات <span class="nav-badge" id="bCats">0</span></div>
      <div class="nav-item" data-view="featured"><span class="ic">⭐</span> المميزة <span class="nav-badge" id="bFeat">0</span></div>
      <div class="nav-item" data-view="orders"><span class="ic">📦</span> الطلبات <span class="nav-badge" id="bOrders" style="background:rgba(224,114,140,.2);color:#F3B4C2">0</span></div>
      <div class="nav-item" data-view="messages"><span class="ic">💬</span> الرسائل <span class="nav-badge" id="bMsgs">0</span></div>
      <div class="nav-item" data-view="income"><span class="ic">💰</span> الأرباح</div>
      <div class="nav-item" data-view="settings"><span class="ic">⚙️</span> الإعدادات</div>
    </nav>
    <div class="sidebar-foot">
      <a href="index.html" target="_blank">🌐 عرض المتجر</a>
      <button id="logoutBtn">🔒 تسجيل الخروج</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <h1 id="viewTitle">المنتجات</h1>
      <div id="topActions"></div>
    </div>
    <div id="view"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="js/firebase.js"></script>
<script src="js/yalidine.js"></script>
<script>
(function () {
  var PASSWORD = 'tango88';
  var $ = function (s, r) { return (r || document).querySelector(s); };
  var esc = function (s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); };
  function toast(m) { var t = $('#toast'); t.textContent = m; t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(function () { t.classList.remove('show'); }, 2200); }

  var state = { products: [], categories: [], featured: [], orders: [], messages: [], settings: {}, expenses: [] };
  var catMap = {};

  // ───────── auth ─────────
  function showShell() { $('#login').style.display = 'none'; $('#shell').classList.add('on'); loadAll(); }
  if (sessionStorage.getItem('ds_admin') === '1') showShell();
  $('#loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    if ($('#pw').value === PASSWORD) { sessionStorage.setItem('ds_admin', '1'); try { localStorage.setItem('ds_staff', '1'); } catch (er) {} showShell(); }
    else { toast('كلمة المرور غير صحيحة'); $('#pw').value = ''; }
  });
  $('#logoutBtn').addEventListener('click', function () { sessionStorage.removeItem('ds_admin'); try { localStorage.removeItem('ds_staff'); } catch (er) {} location.reload(); });
  $('#menuBtn').addEventListener('click', function () { $('#sidebar').classList.toggle('open'); });
  // Click outside the open sidebar closes it
  document.addEventListener('click', function (e) {
    var sb = $('#sidebar'), mb = $('#menuBtn');
    if (!sb.classList.contains('open')) return;
    if (sb.contains(e.target) || (mb && mb.contains(e.target))) return;
    sb.classList.remove('open');
  });

  // ───────── data ─────────
  function loadAll() {
    Promise.all([DS.getProducts(), DS.getCategories(), DS.getFeatured(), DS.getOrders(), DS.getMessages(), DS.getSettings(), DS.getExpenses()])
      .then(function (r) {
        state.products = r[0]; state.categories = r[1]; state.featured = r[2]; state.orders = r[3]; state.messages = r[4]; state.settings = r[5] || {};
        state.expenses = r[6] || [];
        catMap = {}; state.categories.forEach(function (c) { catMap[c.id] = c.name; });
        updateBadges(); render();
        watchLedger();
      });
  }

  // Live ledger: keep orders/expenses fresh so the money tab updates as
  // sales and expenses happen (only the income view re-renders itself).
  var ledgerWatched = false;
  function watchLedger() {

  function saveFeatured() {
    if (!fForm.productName || !fForm.image) { toast('املئي الاسم والصورة'); return; }
    var data = { productName: fForm.productName, rightText: fForm.rightText, leftText: fForm.leftText, ctaText: fForm.ctaText, productLink: fForm.productLink, image: fForm.image };
    if (fForm.editId) {
      data.order = (state.featured.find(function (f) { return String(f.id) === String(fForm.editId); }) || {}).order || 0;
      DS.setDoc('featured_products', fForm.editId, Object.assign({ id: fForm.editId }, data)).then(function () {
        var idx = state.featured.findIndex(function (f) { return String(f.id) === String(fForm.editId); });
        if (idx >= 0) state.featured[idx] = Object.assign({ id: fForm.editId }, data);
        fForm = { editId: null, productName: '', rightText: '', leftText: '', ctaText: '', productLink: '', image: '' }; toast('تم الحفظ ✓'); views.featured();
      }).catch(function () { toast('فشل'); });
    } else {
      data.id = Date.now(); data.order = state.featured.length;
      DS.setDoc('featured_products', data.id, data).then(function () { state.featured.push(data); fForm = { editId: null, productName: '', rightText: '', leftText: '', ctaText: '', productLink: '', image: '' }; updateBadges(); toast('تم الإضافة ✓'); views.featured(); }).catch(function () { toast('فشل'); });
    }

  function moveFeatured(id, dir) {
    var list = state.featured.slice().sort(function (a, b) { return (a.order || 0) - (b.order || 0); });
    var i = list.findIndex(function (f) { return String(f.id) === String(id); }); var j = i + dir;
    if (j < 0 || j >= list.length) return;
    var t = list[i]; list[i] = list[j]; list[j] = t;
    var ups = list.map(function (f, k) { f.order = k; return DS.updateDoc('featured_products', f.id, { order: k }); });
    state.featured = list; Promise.all(ups).then(function () { views.featured(); });
  }

  // ═══════════ ORDERS ═══════════
  // Orders are listed by date placed, newest first.
  function orderStamp(o) {
    return o.placedAt && o.placedAt.seconds ? o.placedAt.seconds * 1000 : (o.createdAt || 0);
  }
  // When the parcel was handed to a carrier — the income tab uses it as the sale date.
  function confirmStamp(o) {
    if (o.noest && o.noest.tracking) return Number(o.noest.createdAt) || 1;
    if (o.yalidine && o.yalidine.tracking) return Number(o.yalidine.createdAt) || 1;
    if (o.zr && o.zr.tracking) return Number(o.zr.createdAt) || 1;
    return 0;
  }
  // Carrier display metadata (name/color/icon), keyed by the order fields
  // (o.noest / o.yalidine / o.zr) and by o.deliveryCompany.
  var CO = {
    yalidine: { name: 'Yalidine', color: '#E11900', icon: '🔴', bg: 'rgba(225,25,0,.18)', ink: '#FF9A8C' },
    noest: { name: 'Noest', color: '#1E73E8', icon: '🔵', bg: 'rgba(30,115,232,.18)', ink: '#9DBBF5' },
    zr: { name: 'ZR Express', color: '#E8A413', icon: '🟡', bg: 'rgba(232,164,19,.18)', ink: '#F5CE7A' }
  };
  function orderCarrier(o) {
    if (o.noest && o.noest.tracking) return 'noest';
    if (o.yalidine && o.yalidine.tracking) return 'yalidine';
    if (o.zr && o.zr.tracking) return 'zr';
    return null;
  }
  var TRACK_ICONS = ['📥', '📦', '🏭', '🚚', '✅'];
  function renderTrackStepper(o) {
    var carrier = orderCarrier(o);
    if (!carrier) return '';
    var color = CO[carrier].color;
    var refreshBtn = '<button class="btn btn-sm ptrack-refresh" data-track="' + esc(o.id) + '" style="background:' + color + ';color:#fff;margin-right:auto">🔄 تحديث</button>';
    var ts = o.trackingStatus;

    if (!ts || ts.carrier !== carrier || ts.tracking !== (o[carrier] && o[carrier].tracking)) {
      return '<div class="ptrack"><div class="ptrack-empty">لم يتم التحقق من حالة الطرد بعد.' + refreshBtn + '</div></div>';
    }

    var labels = ts.stageLabels || [];
    var hasAlert = !!ts.alert;
    var isReturn = (ts.stage == null);          // return / cancel — no forward-progress value
    var effStage = isReturn ? -1 : ts.stage;    // -1 = nothing reached, but the steps still show
    // A delivery-problem ⚠️ means the parcel is NOT delivered — never let the final
    // step ("تم الاستلام") turn green while the triangle shows.
    if (hasAlert && !isReturn) effStage = Math.min(effStage, labels.length - 2);
    var WARN_IDX = 3;                            // ⚠️ sits between "خرج للتوصيل" and "تم الاستلام"
    // The stepper is ALWAYS shown — an alert/return only adds a ⚠️ marker and a
    // badge, it never replaces the tracker with a banner.
    var body = '<div class="pstep">' + labels.map(function (lab, i) {
      var reached = i <= effStage;              // reached steps (and every one before) turn green
      var cls = 'pstep-node' + (reached ? ' done' : '') + (i === effStage && !hasAlert ? ' cur' : '');
      var node = '<div class="' + cls + '"><div class="pstep-dot">' + (reached ? '✓' : (TRACK_ICONS[i] || '•')) + '</div><div class="pstep-lab">' + esc(lab) + '</div></div>';
      var line = '';
      if (i < labels.length - 1) {
        var warnHere = hasAlert && i === WARN_IDX;
        line = '<div class="pstep-line' + (i < effStage ? ' done' : '') + (warnHere ? ' warn' : '') + '">' +
               (warnHere ? '<span class="pstep-warn" title="' + esc(ts.alert) + '">🔺</span>' : '') + '</div>';
      }
      return node + line;
    }).join('') + '</div>';

    var lastDate = ts.lastDate ? new Date(ts.lastDate).toLocaleString('ar-DZ') : null;
    var updated = ts.updatedAt ? new Date(ts.updatedAt).toLocaleString('ar-DZ') : null;
    var carrierName = (CO[carrier] && CO[carrier].name) || carrier;
    // Show BOTH our Arabic stage and the carrier's own status text, so it's clear
    // what step we display AND exactly what the delivery API reported.
    var stageAr = (!isReturn && labels[ts.stage]) ? labels[ts.stage] : null;
    var badge = isReturn
      ? '<span class="ptrack-badge bad">⚠️ ' + esc(ts.alert || '—') + '</span>'
      : (hasAlert
          ? '<span class="ptrack-badge warn">🔺 ' + esc(ts.alert) + '</span>'
          : (stageAr ? '<span class="ptrack-badge ok">' + esc(stageAr) + '</span>' : ''));
    var rawLabel = ts.lastLabel ? esc(ts.lastLabel) : null;
    var meta = '<div class="ptrack-meta">' +
      '<div class="ptrack-status">' + badge +
        (rawLabel ? '<span class="ptrack-raw">حالة ' + esc(carrierName) + ': <b>' + rawLabel + '</b></span>' : '') +
      '</div>' +
      '<div class="ptrack-sub">' +
        (lastDate ? '🕒 آخر حدث: ' + lastDate : '') +
        (ts.lastLocation ? (lastDate ? ' · ' : '') + '📍 ' + esc(ts.lastLocation) : '') +
        (updated ? ((lastDate || ts.lastLocation) ? ' · ' : '') + '🔄 تحديث: ' + updated : '') +
      '</div>' +
    '</div>';

    // Activity details from the carrier API — agent, hub, causer and the reason —
    // folded by default; click "تفاصيل الشحنة" to expand. `badge-class` is used only
    // to colour the status/reason (green=success, red=problem, blue=in-progress),
    // never shown as raw text.
    function badgeCls(b) {
      b = String(b || '').toLowerCase();
      if (/success/.test(b)) return 'ok';
      if (/danger|error/.test(b)) return 'bad';
      if (/warn/.test(b)) return 'warn';
      if (/primary|info/.test(b)) return 'info';
      return '';
    }
    var evs = (ts.events || []).filter(function (e) { return e && e.date; });
    var log = '';
    if (evs.length) {
      log = '<details class="ptrack-log"><summary class="ptrack-log-h">📋 تفاصيل الشحنة (' + evs.length + ')</summary>' +
        evs.slice().reverse().map(function (e) {
          var cls = badgeCls(e.badge);
          var d = e.date ? new Date(e.date).toLocaleString('ar-DZ') : '';
          var bits = [];
          if (e.by) bits.push('🚚 ' + esc(e.by));
          if (e.center) bits.push('🏢 ' + esc(e.center));
          if (e.location) bits.push('📍 ' + esc(e.location));
          if (e.causer) bits.push('causer: ' + esc(e.causer));
          if (e.content) bits.push('content: <span class="clr ' + cls + '">' + esc(e.content) + '</span>');
          if (d) bits.push('🕒 ' + d);
          return '<div class="ptrack-log-item"><div class="ptrack-log-top ' + cls + '">' + esc(e.label || '—') + '</div>' +
                 (bits.length ? '<div class="ptrack-log-sub">' + bits.join(' · ') + '</div>' : '') + '</div>';
        }).join('') + '</details>';
    }

    return '<div class="ptrack">' + body + meta +
           '<div class="row-actions" style="margin-top:.7rem">' + refreshBtn + '</div>' +
           log + '</div>';
  }

  // Store the fresh status on the order; the function also syncs
  // noest.validated server-side when Noest's activity proves validation.
  function applyTrackingResult(o, status) {
    o.trackingStatus = status;
    if (status && status.carrier === 'noest' && status.noestValidated && o.noest) o.noest.validated = true;
    // ZR Express can heal a not-yet-resolved tracking number on refresh (see
    // functions/index.js getParcelStatus) — keep the in-memory order in sync so
    // the just-rendered stepper doesn't look stale until the next full reload.
    if (status && status.carrier === 'zr' && status.tracking && o.zr) o.zr.tracking = status.tracking;
  }

  // After a refresh re-renders the list, bring this order's tracker into view and
  // scroll its (horizontally scrollable) stepper to the current/last-reached step,
  // so the latest parcel status is visible without scrolling by hand.
  function scrollTrackerToCurrent(orderId) {
    requestAnimationFrame(function () {
      var btn = null;
      document.querySelectorAll('.ptrack-refresh').forEach(function (b) {
        if (String(b.dataset.track) === String(orderId)) btn = b;
      });
      var ptrack = btn && btn.closest('.ptrack');
      if (!ptrack) return;
      var pstep = ptrack.querySelector('.pstep');
      var target = null;
      if (pstep) {
        target = pstep.querySelector('.pstep-node.cur');
        if (!target) { var done = pstep.querySelectorAll('.pstep-node.done'); target = done[done.length - 1] || null; }
      }
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      else ptrack.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  }

  function refreshTracking(orderId, btn) {
    if (typeof firebase === 'undefined' || !firebase.functions) { toast('الخدمة غير متوفرة'); return; }
    var orig = btn ? btn.textContent : '';
    if (btn) { btn.disabled = true; btn.textContent = '⏳ جاري التحقق...'; }
    firebase.functions().httpsCallable('getParcelStatus')({ orderId: orderId })
      .then(function (res) {
        var o = state.orders.find(function (x) { return String(x.id) === String(orderId); });
        if (o) applyTrackingResult(o, res.data);
        views.orders();
        scrollTrackerToCurrent(orderId);
      })
      .catch(function (err) {
        console.error('getParcelStatus', err);
        toast('تعذّر جلب حالة الطرد: ' + (err && err.message ? err.message : 'خطأ'));
        if (btn) { btn.disabled = false; btn.textContent = orig; }
      });
  }

  // Refreshes every order that has a parcel, one at a time (not in parallel) so
  // we don't burst past Noest/Yalidine's rate limits when there are many orders.
  function refreshAllTracking(btn) {
    if (typeof firebase === 'undefined' || !firebase.functions) { toast('الخدمة غير متوفرة'); return; }
    var targets = state.orders.filter(function (o) { return !!orderCarrier(o); });
    if (!targets.length) { toast('لا توجد طلبات بها طرود لتحديثها'); return; }
    var orig = btn ? btn.innerHTML : '';
    if (btn) btn.disabled = true;
    var i = 0, ok = 0, fail = 0;
    function next() {
      if (i >= targets.length) {
        if (btn) { btn.disabled = false; btn.innerHTML = orig; }
        views.orders();
        toast('تم تحديث ' + ok + ' طرد' + (fail ? ' — تعذّر تحديث ' + fail : ''));
        return;
      }
      var o = targets[i++];
      if (btn) btn.textContent = '⏳ جاري التحديث... (' + i + '/' + targets.length + ')';
      firebase.functions().httpsCallable('getParcelStatus')({ orderId: o.id })
        .then(function (res) { applyTrackingResult(o, res.data); ok++; })
        .catch(function (err) { console.error('getParcelStatus', o.id, err); fail++; })
        .then(function () { setTimeout(next, 350); });
    }
    next();
  }

  views.orders = function () {
    var list = state.orders.slice().sort(function (a, b) { return orderStamp(b) - orderStamp(a); });
    var trackedCount = list.filter(function (o) { return !!orderCarrier(o); }).length;
    var refreshAllBar = trackedCount ? '<div class="toolbar"><div class="row-actions">' +
      '<button class="btn btn-blue btn-sm" id="refreshAllTrack">🔄 تحديث حالة كل الطرود (' + trackedCount + ')</button>' +
      '</div></div>' : '';
    var printBar = '<div id="noestBar" style="display:none;position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);z-index:300;background:#1E73E8;border-radius:100px;box-shadow:0 10px 30px rgba(0,0,0,.35);padding:.35rem .5rem">' +
      '<button class="btn btn-sm" id="printNoest" style="background:transparent;color:#fff;font-weight:800;border:none">🖨️ طباعة الوصول المحددة (<span id="noestCount">0</span>)</button></div>';
    $('#view').innerHTML = refreshAllBar + printBar + (list.length ? list.map(function (o) {
      var oco = CO[o.deliveryCompany] || CO.yalidine; // customer's chosen carrier (tag colors)
      var phone = String(o.phone || '').replace(/\s/g, '');
      var intl = phone.replace(/^0/, '213');
      var items = (o.items || []).map(function (it) { return '• ' + esc(it.title) + ' ×' + (it.qty || it.quantity || 1); }).join('<br>');
      var picList = (o.items || []).map(function (it) {
        var img = it.image;
        if (!img) { var p = state.products.find(function (x) { return String(x.id) === String(it.id); }); img = p ? DS.productImages(p)[0] : ''; }
        return img ? { img: img, qty: it.qty || it.quantity || 1 } : null;
      }).filter(Boolean);
      var pics = picList.length
        ? '<div class="order-pics">' + picList.map(function (pi) { return '<div class="op"><img src="' + esc(pi.img) + '" loading="lazy" onerror="this.parentNode.remove()">' + (pi.qty > 1 ? '<b>×' + pi.qty + '</b>' : '') + '</div>'; }).join('') + '</div>' +
          '<div class="order-dots">' + new Array((o.items || []).length + 1).join('<i></i>') + '</div>'
        : '';
      var when = o.placedAt && o.placedAt.seconds ? new Date(o.placedAt.seconds * 1000) : (o.createdAt ? new Date(o.createdAt) : null);
      // Orders older than 7 days start folded to keep the list scannable; newer ones stay open.
      var isOld = when && (Date.now() - when.getTime() > 7 * 24 * 60 * 60 * 1000);
      // Customer name / phone / location — kept in the always-visible summary so a
      // folded order still shows who and where at a glance.
      var metaLine = '<div class="order-meta"><span>👤 ' + esc(o.customer) + '</span><span class="num">📱 ' + esc(o.phone) + '</span>' + (o.wilaya ? '<span>📍 ' + esc(o.wilaya) + ' - ' + esc(o.baladiya) + '</span>' + (o.address ? '<span>🏠 ' + esc(o.address) + '</span>' : '') + '<span>🚚 ' + (o.deliveryType === 'office' ? 'مكتب (Stop Desk)' : 'منزل') + (o.deliveryFee != null ? ' · ' + esc(DS.priceFmt(o.deliveryFee)) : '') + '</span>' : '') + '</div>';
      return '<div class="order-card' + (o.source === 'admin_phone' ? ' byadmin' : '') + (o.fulfilled ? ' confirmed' : '') + '">' +
        '<details class="ocard"' + (isOld ? '' : ' open') + '><summary class="ocard-h">' +
        '<div class="order-head"><div><span class="tag ' + (o.fulfilled ? 'done' : 'new') + '">' + (o.fulfilled ? 'تم التنفيذ' : 'جديد') + '</span>' + (o.source === 'admin_phone' ? ' <span class="tag" style="background:rgba(167,139,250,.18);color:#C4B5FD;border-color:transparent;font-weight:800">📞 أدخلتيه بنفسك</span>' : '') + (o.source === 'seller_direct' ? ' <span class="tag" style="background:rgba(217,168,108,.18);color:var(--gold);border-color:transparent">🧾 بائع مباشر</span>' : '') + (o.source === 'landing_collagen' ? ' <span class="tag" style="background:rgba(95,201,168,.18);color:#5FC9A8;border-color:transparent;font-weight:800">🧴 صفحة الكولاجين</span>' : '') + (o.wilaya ? ' <span class="tag" style="background:' + oco.bg + ';color:' + oco.ink + ';border-color:transparent;font-weight:800">' + oco.icon + ' ' + oco.name + ' · ' + (o.deliveryType === 'office' ? 'مكتب (Stop Desk)' : 'منزل') + '</span>' : ' <span class="tag" style="background:rgba(229,72,77,.16);color:var(--danger);border-color:transparent;font-weight:800">📍 بانتظار تأكيد العنوان</span>') + ' <b style="margin-right:.4rem">' + esc(o.num || o.id) + '</b><div style="font-size:.78rem;color:var(--ink-3);margin-top:.3rem">' + (when ? when.toLocaleString('ar-DZ') : '') + '</div></div>' +
          '<div style="text-align:left"><div style="font-weight:900;color:var(--rose);font-size:1.1rem">' + esc(DS.priceFmt(o.total != null ? o.total : o.subtotal)) + '</div>' +
            (o.deliveryFee != null ? '<div style="font-size:.7rem;color:var(--ink-3);margin-top:.2rem">منتجات ' + esc(DS.priceFmt(o.subtotal)) + ' + توصيل ' + esc(DS.priceFmt(o.deliveryFee)) + '</div>' : '') +
          '</div></div>' +
        metaLine +
        '</summary><div class="odim">' +
        pics +

  // Fetch label PDF(s) for the given trackings via the getNoestLabels function
  // (Noest requires the API token, so the browser can't link to them directly)
  // and open the result — multiple labels arrive merged into one PDF.
  function openNoestLabels(trackings, btn) {
    if (!trackings || !trackings.length) return;
    if (typeof firebase === 'undefined' || !firebase.functions) { toast('الخدمة غير متوفرة'); return; }
    var w = window.open('about:blank', '_blank');
    var orig = btn ? btn.innerHTML : '';
    if (btn) { btn.disabled = true; btn.textContent = '⏳ جاري تجهيز الوصول...'; }
    firebase.functions().httpsCallable('getNoestLabels')({ trackings: trackings })
      .then(function (res) {
        var b64 = (res.data || {}).pdf || '';
        var bin = atob(b64), arr = new Uint8Array(bin.length);
        for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
        var url = URL.createObjectURL(new Blob([arr], { type: 'application/pdf' }));
        if (w) w.location = url; else window.open(url, '_blank');
        if (btn) { btn.disabled = false; btn.innerHTML = orig; }
      })
      .catch(function (err) {
        console.error('getNoestLabels', err);
        if (w) { try { w.close(); } catch (e) {} }
        if (btn) { btn.disabled = false; btn.innerHTML = orig; }
        alert('تعذّر جلب الوصل:\n' + (err && err.message ? err.message : 'خطأ'));
      });
  }

  function createParcel(fnName, field, id, btn, label) {
    var o = state.orders.find(function (x) { return String(x.id) === String(id); });
    if (!o) return;
    var inp = document.querySelector('.note-inp[data-notefor="' + id + '"]');
    var note = inp ? inp.value.trim() : (o.deliveryLabel || '');
    if (!note) { toast('أدخلي اسم المنتج الذي سيظهر على وصل التوصيل أولاً'); if (inp) { inp.style.borderColor = 'var(--danger)'; inp.focus(); } return; }
    var pinp = document.querySelector('.price-inp[data-pricefor="' + id + '"]');
    var praw = pinp ? pinp.value.trim() : '';
    var parcelPrice = null;
    if (praw !== '') {
      var pn = Number(praw);
      if (isNaN(pn) || pn < 0) { toast('سعر الطرد غير صالح'); if (pinp) { pinp.style.borderColor = 'var(--danger)'; pinp.focus(); } return; }
      parcelPrice = pn;
    }
    var origTotal = o.total != null ? o.total : o.subtotal;
    if (!confirm('إنشاء طرد ' + label + ' لـ ' + (o.customer || o.num) + '؟\nاسم المنتج على الوصل: «' + note + '»\nسعر الطرد: ' + (parcelPrice != null ? parcelPrice + ' د.ج (بدلاً من ' + origTotal + ')' : origTotal + ' د.ج (بدون تغيير)'))) return;
    if (typeof firebase === 'undefined' || !firebase.functions) { toast('خدمة الإنشاء غير متوفرة'); return; }
    var original = btn ? btn.textContent : '';
    if (btn) { btn.disabled = true; btn.textContent = '⏳ جاري الإنشاء...'; }
    o.deliveryLabel = note; o.parcelPrice = parcelPrice;
    DS.updateDoc('orders', o.id, { deliveryLabel: note, parcelPrice: parcelPrice })
      .then(function () { return firebase.functions().httpsCallable(fnName)({ orderId: o.id }); })
      .then(function (res) {
        var d = res.data || {};
        o[field] = { tracking: d.tracking, label: d.label || null, validated: d.validated, createdAt: Date.now() };
        o.fulfilled = true;
        toast(d.alreadyCreated ? 'الطرد موجود مسبقاً ✓' : 'تم إنشاء طرد ' + label + ' ✓ ' + (d.tracking || ''));
        updateBadges(); views.orders();
      })
      .catch(function (err) {
        console.error(fnName, err);
        if (btn) { btn.disabled = false; btn.textContent = original; }
        alert('تعذّر إنشاء طرد ' + label + ':\n' + (err && err.message ? err.message : 'خطأ غير معروف'));
      });
  }

  // ═══════════ INCOME / EXPENSES ═══════════
  // Sales income = final package price (parcelPrice override or order total)
  // minus the delivery fee, counted for fulfilled orders only.
  function saleStamp(o) {
    var c = confirmStamp(o);
    if (c > 1) return c;
    return orderStamp(o);
  }
  var openLedger = {}; // expanded sale rows, kept across live re-renders
  views.income = function () {

      var price = Number(o.parcelPrice != null ? o.parcelPrice : (o.total != null ? o.total : o.subtotal)) || 0;
      return { type: 'in', ts: saleStamp(o), amount: price - (Number(o.deliveryFee) || 0), label: '🛍️ طلب ' + (o.num || o.id) + (o.customer ? ' — ' + o.customer : ''), order: o, price: price };
    });

    });

    var incomeTotal = sales.reduce(function (s, r) { return s + r.amount; }, 0);
    var expTotal = exps.reduce(function (s, r) { return s + r.amount; }, 0);

              if (r.order) {

  };

        '<div class="grid2">' +
          '<div class="field"><label>بريد Gmail للإشعارات</label><input class="inp" id="sNtEmail" dir="ltr" value="' + esc(s.notifyEmail || '') + '" placeholder="you@gmail.com"></div>' +
          '<div class="field"><label>App Password</label><input class="inp" id="sNtPass" type="password" autocomplete="off" dir="ltr" placeholder="' + (s.notifyReady ? '•••••• (محفوظ)' : 'xxxx xxxx xxxx xxxx') + '"></div>' +
        '</div>' +
        '<div style="font-size:.75rem;color:var(--ink-3);margin-top:-.3rem;margin-bottom:.8rem">يصلكِ بريد إلكتروني عند كل طلب شراء أو رسالة جديدة. أنشئي App Password من إعدادات حساب Google (الأمان ← التحقق بخطوتين ← App passwords) والصقيه هنا — ليس كلمة سر حسابكِ العادية. يُخزَّن بشكل آمن ولا يظهر في الموقع.</div>' +
        '<div class="row-actions"><button class="btn btn-green" id="sNtSave">💾 حفظ إعدادات البريد</button>' +
        '<button class="btn btn-gray" id="sNtTest">✉️ إرسال بريد تجريبي</button>' +
        '<button class="btn btn-blue" id="sNtPush">🔔 تفعيل إشعارات هذا الجهاز</button></div>' +
        '<div style="font-size:.75rem;color:var(--ink-3);margin-top:.8rem">زر «تفعيل إشعارات هذا الجهاز» يجعل الإشعارات المنبثقة تصل للهاتف حتى والموقع مغلق. على آيفون: أضيفي لوحة التحكم إلى الشاشة الرئيسية أولاً ثم فعّلي الزر من داخلها.</div>' +
      '</div>' +
      '<div class="card" style="max-width:680px"><h3>إعدادات عامة</h3>' +
        '<div class="field"><label>صورة الواجهة (Hero)</label><div style="display:flex;gap:.75rem;align-items:center"><img class="thumb-prev" id="sHeroPrev" src="' + (s.heroImage || transparent()) + '"><input class="inp" id="sHero" value="' + esc(s.heroImage || '') + '" style="flex:1" placeholder="رابط الصورة"><label class="upload-lbl" id="sHeroUp">⬆ رفع</label></div></div>' +
        '<div class="grid2">' +
          '<div class="field"><label>اسم المتجر</label><input class="inp" id="sName" value="' + esc(s.storeName || 'جمالكِ الخارجي') + '"></div>' +
          '<div class="field"><label>رقم واتساب (دولي)</label><input class="inp" id="sWa" value="' + esc(s.waNumber || '213662705830') + '" dir="ltr"></div>' +
          '<div class="field"><label>إنستغرام</label><input class="inp" id="sIg" value="' + esc(s.instagram || '') + '" dir="ltr" placeholder="https://instagram.com/..."></div>' +
          '<div class="field"><label>فيسبوك</label><input class="inp" id="sFb" value="' + esc(s.facebook || '') + '" dir="ltr" placeholder="https://facebook.com/..."></div>' +
          '<div class="field"><label>تيك توك</label><input class="inp" id="sTt" value="' + esc(s.tiktok || '') + '" dir="ltr" placeholder="https://tiktok.com/@..."></div>' +
        '</div>' +
        '<div class="row-actions"><button class="btn btn-green" id="sSave">💾 حفظ الإعدادات</button></div>' +
      '</div>' +
      '<div class="card" style="max-width:680px"><h3>🔴 البث المباشر (تيك توك)</h3>' +
        '<div style="font-size:.82rem;color:var(--ink-2);line-height:1.7;margin-bottom:1rem">عند بدء بثكِ المباشر على تيك توك، فعّلي الزر فيظهر زرّ عائم متحرّك يدعو الزوار للانضمام. يُخفى تلقائياً بعد المدة المحددة (أو أطفئيه يدوياً). يستخدم رابط حساب تيك توك المحفوظ.</div>' +
        '<div class="field" style="max-width:240px"><label>يُخفى الزر تلقائياً بعد</label><select class="sel" id="sLiveHours">' +
          [1, 2, 3, 4, 6].map(function (h) { return '<option value="' + h + '"' + (liveHours === h ? ' selected' : '') + '>' + h + ' ساعات</option>'; }).join('') + '</select></div>' +
        '<div class="row-actions"><button class="btn" style="background:' + (liveActive ? '#FE2C55' : 'var(--card-2)') + ';color:' + (liveActive ? '#fff' : 'var(--ink-3)') + ';border:1px solid var(--border);font-weight:800" id="sToggleLive">' + (liveActive ? '🔴 البث مباشر الآن — إيقاف الزر' : '⚫ غير مباشر — تشغيل الزر') + '</button></div>' +
      '</div>' +
      '<div class="card" style="max-width:680px"><h3>🚚 ربط Yalidine API</h3>' +
        '<div style="margin-bottom:1.1rem;padding:.7rem 1rem;border-radius:11px;font-weight:700;font-size:.85rem;' + (s.yalidineReady ? 'background:rgba(34,197,94,.12);color:#7CE5A0">✓ مربوط بحساب Yalidine' : 'background:rgba(229,72,77,.12);color:#F2A1A4">● غير مربوط بعد') + '</div>' +
        '<div class="field"><label>ولاية الإرسال (المتجر)</label>' +
          '<select class="sel" id="sOrigin"><option value="">اختاري ولاية الإرسال</option>' +
          (window.YALIDINE ? YALIDINE.wilayas.map(function (w) { return '<option value="' + esc(w.fr) + '"' + (s.originWilaya === w.fr ? ' selected' : '') + '>' + w.id + ' - ' + esc(w.ar) + ' (' + esc(w.fr) + ')</option>'; }).join('') : '') +
          '</select></div>' +
        '<div class="grid2">' +
          '<div class="field"><label>API ID</label><input class="inp" id="sYalId" type="password" autocomplete="off" dir="ltr" placeholder="' + (s.yalidineReady ? '•••••• (محفوظ)' : 'أدخلي API ID') + '"></div>' +
          '<div class="field"><label>API Token</label><input class="inp" id="sYalToken" type="password" autocomplete="off" dir="ltr" placeholder="' + (s.yalidineReady ? '•••••• (محفوظ)' : 'أدخلي API Token') + '"></div>' +
        '</div>' +
        '<div style="font-size:.75rem;color:var(--ink-3);margin-top:-.3rem;margin-bottom:.8rem">احصلي على API ID و Token من حسابكِ في Yalidine (قسم API / المطوّرين). تُخزَّن بشكل آمن ولا تظهر في الموقع. اتركي الحقول فارغة للإبقاء على القيم المحفوظة.</div>' +
        '<div class="row-actions"><button class="btn btn-green" id="sSaveYal">💾 حفظ ربط Yalidine</button>' + toggleBtn('sToggleYal', yalEnabled) + '</div>' +
      '</div>' +
      '<div class="card" style="max-width:680px;border-color:var(--blue)"><h3 style="color:#9DBBF5">🔵 ربط Noest API</h3>' +
        '<div style="margin-bottom:1.1rem;padding:.7rem 1rem;border-radius:11px;font-weight:700;font-size:.85rem;' + (s.noestReady ? 'background:rgba(91,141,239,.15);color:#9DBBF5">✓ مربوط بحساب Noest' : 'background:rgba(229,72,77,.12);color:#F2A1A4">● غير مربوط بعد') + '</div>' +
        '<div class="grid2">' +
          '<div class="field"><label>API Token</label><input class="inp" id="sNoToken" type="password" autocomplete="off" dir="ltr" placeholder="' + (s.noestReady ? '•••••• (محفوظ)' : 'أدخلي API Token') + '"></div>' +
          '<div class="field"><label>user_guid</label><input class="inp" id="sNoGuid" type="password" autocomplete="off" dir="ltr" placeholder="' + (s.noestReady ? '•••••• (محفوظ)' : 'أدخلي user_guid') + '"></div>' +
        '</div>' +
        '<div style="font-size:.75rem;color:var(--ink-3);margin-top:-.3rem;margin-bottom:.8rem">احصلي على api_token و user_guid من NOEST عند إنشاء حسابكِ. تُخزَّن بشكل آمن ولا تظهر في الموقع. اتركي الحقول فارغة للإبقاء على القيم المحفوظة.</div>' +
        '<div class="row-actions"><button class="btn btn-blue" id="sSaveNoest">💾 حفظ ربط Noest</button><button class="btn btn-gray" id="sSyncNoest">🔄 تحديث قوائم التوصيل (ولايات/بلديات/أسعار)</button>' + toggleBtn('sToggleNoest', noEnabled) + '</div>' +
      '</div>' +
      '<div class="card" style="max-width:680px;border-color:#E8A413"><h3 style="color:#F5CE7A">🟡 ربط ZR Express API</h3>' +
        '<div style="margin-bottom:1.1rem;padding:.7rem 1rem;border-radius:11px;font-weight:700;font-size:.85rem;' + (s.zrReady ? 'background:rgba(232,164,19,.15);color:#F5CE7A">✓ مربوط بحساب ZR Express' : 'background:rgba(229,72,77,.12);color:#F2A1A4">● غير مربوط بعد') + '</div>' +
        '<div class="grid2">' +
          '<div class="field"><label>Tenant ID (X-Tenant)</label><input class="inp" id="sZrTenant" type="password" autocomplete="off" dir="ltr" placeholder="' + (s.zrReady ? '•••••• (محفوظ)' : 'أدخلي Tenant ID') + '"></div>' +
          '<div class="field"><label>Secret Key</label><input class="inp" id="sZrKey" type="password" autocomplete="off" dir="ltr" placeholder="' + (s.zrReady ? '•••••• (محفوظ)' : 'أدخلي Secret Key') + '"></div>' +
        '</div>' +
        '<div style="font-size:.75rem;color:var(--ink-3);margin-top:-.3rem;margin-bottom:.8rem">احصلي على Tenant ID و Secret Key من بوابة ZR Express (API Rest ← Token API — يظهر مرة واحدة فقط). تُخزَّن بشكل آمن ولا تظهر في الموقع. اتركي الحقول فارغة للإبقاء على القيم المحفوظة.</div>' +
        '<div class="row-actions"><button class="btn" style="background:#E8A413;color:#fff" id="sSaveZr">💾 حفظ ربط ZR Express</button><button class="btn btn-gray" id="sSyncZr">🔄 تحديث قوائم التوصيل (ولايات/بلديات)</button>' + toggleBtn('sToggleZr', zrEnabled) + '</div>' +
      '</div>';
    $('#sTheme').onclick = function () {
      var light = document.documentElement.classList.toggle('light');
      try { localStorage.setItem('ds_theme', light ? 'light' : 'dark'); } catch (e) {}
      views.settings();
    };
    $('#sNtSave').onclick = function () {
      var email = $('#sNtEmail').value.trim();
      var pass = $('#sNtPass').value.trim();
      if (!email) { toast('أدخلي بريد Gmail أولاً'); return; }
      var p;
      if (pass) p = DS.setDoc('private', 'notify', { gmail: email, appPass: pass });
      else if (s.notifyReady) p = DS.updateDoc('private', 'notify', { gmail: email });
      else { toast('أدخلي App Password أولاً'); return; }
      p.then(function () { persistSettings({ notifyEmail: email, notifyReady: true }, 'تم حفظ إعدادات البريد ✓', function () { views.settings(); }); })
        .catch(function (e) { console.error(e); toast('فشل الحفظ'); });
    };
    $('#sNtTest').onclick = function () {
      var btn = this;
      btn.disabled = true; btn.textContent = '⏳ جارٍ الإرسال...';
      firebase.functions().httpsCallable('sendTestEmail')({})
        .then(function () { toast('أُرسل البريد التجريبي ✓ تفقّدي صندوق الوارد'); })
        .catch(function (e) { console.error(e); toast(e.message || 'فشل الإرسال'); })
        .then(function () { btn.disabled = false; btn.textContent = '✉️ إرسال بريد تجريبي'; });
    };
    $('#sNtPush').onclick = function () {
      var btn = this;
      if (!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)) {
        toast('هذا المتصفح لا يدعم الإشعارات — جرّبي Chrome، وعلى آيفون أضيفي الصفحة للشاشة الرئيسية أولاً'); return;
      }
      function b64ToU8(base64) {
        var pad = new Array((4 - base64.length % 4) % 4 + 1).join('=');
        var b = (base64 + pad).replace(/-/g, '+').replace(/_/g, '/');
        var raw = atob(b); var arr = new Uint8Array(raw.length);
        for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
        return arr;
      }
      btn.disabled = true; btn.textContent = '⏳ جارٍ التفعيل...';
      Notification.requestPermission().then(function (perm) {
        if (perm !== 'granted') throw new Error('perm-denied');
        return navigator.serviceWorker.register('/push-sw.js');
      }).then(function (reg) {
        return navigator.serviceWorker.ready.then(function () {
          return firebase.functions().httpsCallable('getPushKey')({}).then(function (res) {
            return reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: b64ToU8(res.data.publicKey) });
          });
        });
      }).then(function (sub) {
        var id = btoa(sub.endpoint).replace(/[^a-zA-Z0-9]/g, '').slice(-60);
        return DS.setDoc('push_subs', id, { sub: JSON.stringify(sub), ua: navigator.userAgent.slice(0, 160), at: Date.now() });
      }).then(function () {
        toast('تم تفعيل الإشعارات على هذا الجهاز ✓'); views.settings();
      }).catch(function (e) {
        console.error(e);
        toast(e.message === 'perm-denied' ? 'رُفض إذن الإشعارات — فعّليه من إعدادات المتصفح' : 'فشل تفعيل الإشعارات');
        views.settings();
      });
    };
    $('#sHero').oninput = function (e) { $('#sHeroPrev').src = e.target.value || transparent(); };
    $('#sHeroUp').onclick = function () { pickImage('site_assets', function (url) { $('#sHero').value = url; $('#sHeroPrev').src = url; }); };
    function persistSettings(extra, okMsg, after) {
      var data = Object.assign({}, state.settings, {
        heroImage: $('#sHero').value.trim(), storeName: $('#sName').value.trim(), waNumber: $('#sWa').value.trim(),
        instagram: $('#sIg').value.trim(), facebook: $('#sFb').value.trim(), tiktok: $('#sTt').value.trim()
      }, extra || {});
      var docId = state.settings && state.settings.id ? state.settings.id : 'general';
      data.id = docId;
      return DS.setDoc('site_settings', docId, data)
        .then(function () { state.settings = data; toast(okMsg || 'تم الحفظ ✓'); if (after) after(); })
        .catch(function (e) { console.error(e); toast('فشل الحفظ'); });
    }
    $('#sSave').onclick = function () { persistSettings({}, 'تم حفظ الإعدادات ✓'); };
    if ($('#sToggleLive')) $('#sToggleLive').onclick = function () {
      var willLive = !liveActive;
      if (willLive && !($('#sTt').value.trim() || state.settings.tiktok)) { toast('أضيفي رابط حساب تيك توك أولاً'); return; }
      var hours = $('#sLiveHours') ? (parseInt($('#sLiveHours').value, 10) || 2) : 2;
      var extra = willLive ? { tiktokLive: true, tiktokLiveAt: Date.now(), tiktokLiveHours: hours } : { tiktokLive: false };
      persistSettings(extra, willLive ? 'تم تفعيل زر البث (يُخفى بعد ' + hours + ' ساعات) ✓' : 'تم إيقاف زر البث', function () { views.settings(); });
    };
    if ($('#sLiveHours')) $('#sLiveHours').onchange = function () {
      if (liveActive) persistSettings({ tiktokLiveHours: parseInt(this.value, 10) || 2 }, 'تم تحديث المدة ✓');
    };
    if ($('#sToggleYal')) $('#sToggleYal').onclick = function () {
      var willOn = !yalEnabled;
      if (!willOn && carriersOnCount() <= 1) { toast('يجب إبقاء شركة توصيل واحدة على الأقل'); return; }
      persistSettings({ yalidineEnabled: willOn }, willOn ? 'Yalidine ظاهرة للزبائن ✓' : 'تم إخفاء Yalidine عن الزبائن', function () { views.settings(); });
    };
    if ($('#sToggleNoest')) $('#sToggleNoest').onclick = function () {
      var willOn = !noEnabled;
      if (!willOn && carriersOnCount() <= 1) { toast('يجب إبقاء شركة توصيل واحدة على الأقل'); return; }
      persistSettings({ noestEnabled: willOn }, willOn ? 'Noest ظاهرة للزبائن ✓' : 'تم إخفاء Noest عن الزبائن', function () { views.settings(); });
    };
    if ($('#sToggleZr')) $('#sToggleZr').onclick = function () {
      var willOn = !zrEnabled;
      if (willOn && !s.zrReady) { toast('احفظي Tenant ID و Secret Key الخاصين بـ ZR أولاً'); return; }
      if (!willOn && carriersOnCount() <= 1) { toast('يجب إبقاء شركة توصيل واحدة على الأقل'); return; }
      persistSettings({ zrEnabled: willOn }, willOn ? 'ZR Express ظاهرة للزبائن ✓' : 'تم إخفاء ZR Express عن الزبائن', function () { views.settings(); });
    };
    if ($('#sSaveZr')) $('#sSaveZr').onclick = function () {
      var tenant = $('#sZrTenant') ? $('#sZrTenant').value.trim() : '';
      var key = $('#sZrKey') ? $('#sZrKey').value.trim() : '';
      var hasCreds = !!(tenant && key);
      var alreadyReady = !!state.settings.zrReady;
      if ((tenant && !key) || (key && !tenant)) { toast('أدخلي Tenant ID و Secret Key معاً'); return; }
      if (!hasCreds && !alreadyReady) { toast('أدخلي Tenant ID و Secret Key'); return; }
      function finish() { persistSettings({ zrReady: hasCreds || alreadyReady }, 'تم حفظ ربط ZR Express ✓', function () { views.settings(); }); }
      if (hasCreds) {
        DS.setDoc('private', 'zrexpress', { tenantId: tenant, secretKey: key, updatedAt: Date.now() })
          .then(finish).catch(function (e) { console.error(e); toast('فشل حفظ المفاتيح'); });
      } else { finish(); }
    };
    if ($('#sSaveYal')) $('#sSaveYal').onclick = function () {
      var origin = $('#sOrigin') ? $('#sOrigin').value : '';
      var apiId = $('#sYalId') ? $('#sYalId').value.trim() : '';
      var token = $('#sYalToken') ? $('#sYalToken').value.trim() : '';
      var hasCreds = !!(apiId && token);
      var alreadyReady = !!state.settings.yalidineReady;
      if (!origin) { toast('اختاري ولاية الإرسال'); return; }
      if ((apiId && !token) || (token && !apiId)) { toast('أدخلي API ID و Token معاً'); return; }
      if (!hasCreds && !alreadyReady) { toast('أدخلي API ID و Token'); return; }
      function finish() { persistSettings({ originWilaya: origin, yalidineReady: hasCreds || alreadyReady }, 'تم حفظ ربط Yalidine ✓', function () { views.settings(); }); }
      if (hasCreds) {
        DS.setDoc('private', 'yalidine', { apiId: apiId, apiToken: token, updatedAt: Date.now() })
          .then(finish).catch(function (e) { console.error(e); toast('فشل حفظ المفاتيح'); });
      } else { finish(); }
    };
    if ($('#sSaveNoest')) $('#sSaveNoest').onclick = function () {
      var token = $('#sNoToken') ? $('#sNoToken').value.trim() : '';
      var guid = $('#sNoGuid') ? $('#sNoGuid').value.trim() : '';
      var hasCreds = !!(token && guid);
      var alreadyReady = !!state.settings.noestReady;
      if ((token && !guid) || (guid && !token)) { toast('أدخلي API Token و user_guid معاً'); return; }
      if (!hasCreds && !alreadyReady) { toast('أدخلي API Token و user_guid'); return; }
      function finish() { persistSettings({ noestReady: hasCreds || alreadyReady }, 'تم حفظ ربط Noest ✓', function () { views.settings(); }); }
      if (hasCreds) {
        DS.setDoc('private', 'noest', { apiToken: token, userGuid: guid, updatedAt: Date.now() })
          .then(finish).catch(function (e) { console.error(e); toast('فشل حفظ المفاتيح'); });
      } else { finish(); }
    };
    function syncCarriersClick() {
      if (typeof firebase === 'undefined' || !firebase.functions) { toast('الخدمة غير متوفرة'); return; }
      var btn = this, orig = btn.textContent; btn.disabled = true; btn.textContent = '⏳ جاري التحديث... (قد يستغرق دقيقة)';
      firebase.functions().httpsCallable('syncCarriers')({})
        .then(function (res) { var r = (res.data || {}).result || {}; btn.disabled = false; btn.textContent = orig; toast('تم التحديث ✓ — Yalidine ' + ((r.yalidine || {}).wilayas || 0) + ' ولاية، Noest ' + ((r.noest || {}).wilayas || 0) + ' ولاية، ZR ' + ((r.zr || {}).wilayas || 0) + ' ولاية'); })
        .catch(function (err) { console.error('syncCarriers', err); btn.disabled = false; btn.textContent = orig; alert('تعذّر التحديث:\n' + (err && err.message ? err.message : 'خطأ')); });
    }
    if ($('#sSyncNoest')) $('#sSyncNoest').onclick = syncCarriersClick;
    if ($('#sSyncZr')) $('#sSyncZr').onclick = syncCarriersClick;
  };

  // ───────── helpers ─────────
  function transparent() { return 'data:image/svg+xml;utf8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64"><rect width="64" height="64" fill="#2E222A"/><text x="50%" y="54%" font-size="28" text-anchor="middle">🖼️</text></svg>'); }
  function pagerHTML(cur, total) {
    var html = ''; for (var i = 1; i <= total; i++) { if (total > 7 && i > 2 && i < total - 1 && Math.abs(i - cur) > 1) { if (i === 3 || i === total - 2) html += '<span style="align-self:center;color:var(--ink-3)">…</span>'; continue; } html += '<button class="' + (i === cur ? 'on' : '') + '" data-p="' + i + '">' + i + '</button>'; } return html;
  }
  function wirePager(sel, cb) { document.querySelectorAll(sel + ' button').forEach(function (b) { b.onclick = function () { cb(+b.dataset.p); }; }); }
})();
</script>
